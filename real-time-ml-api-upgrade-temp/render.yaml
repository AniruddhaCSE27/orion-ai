services:
  - type: web
    name: real-time-ml-prediction-api
    env: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /health/live
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: API_USERNAME
        sync: false
      - key: API_PASSWORD
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: AUTH_RATE_LIMIT
        value: 5/minute
      - key: PREDICT_RATE_LIMIT
        value: 20/minute
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: TRUSTED_HOSTS
        value: "*"
      - key: MODEL_PATH
        value: models/model.pkl
